<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
function getCurrentFolderCapitalized() {
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);

    let folder = "";

    if (parts.length === 0) return folder;

    if (parts[parts.length - 1].includes(".")) {
        folder = parts[parts.length - 2] || "";
    } else {
        folder = parts[parts.length - 1];
    }

    return folder.charAt(0).toUpperCase() + folder.slice(1);
}

console.log(getCurrentFolderCapitalized());
</script>

<script>document.write( "<title>" + getCurrentFolderCapitalized()+ " Projects</title>")</script>


<style>
:root{
    --card-width:320px;
    --image-height:240px;
    --radius:14px;
    --shadow:0 10px 28px rgba(0,0,0,.12);
    --text:#222;
    --muted:#666;
    --bg:#f5f6f8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Inter,Segoe UI,Roboto,sans-serif;
    color:var(--text);
}

header{
    text-align:center;
    padding:50px 20px 30px;
}

header h1{
    margin:0;
    font-weight:300;
    letter-spacing:2px;
    font-size:2.2rem;
}

#gallery{

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(320px,1fr));

    gap:28px;

    padding:30px;

    max-width:1700px;

    margin:auto;

}

.card{

    background:white;

    border-radius:var(--radius);

    overflow:hidden;

    box-shadow:var(--shadow);

    transition:.25s;

    position:relative;

}

.card:hover{
    transform:translateY(-4px);
}

.main-image{

    width:100%;
    height:240px;

    object-fit:cover;

    display:block;

    cursor:pointer;

}

.info{

    padding:18px;

}

.info div{

    margin:5px 0;

    line-height:1.3em;

}

.label{

    color:var(--muted);

    font-size:.82rem;

    text-transform:uppercase;

    letter-spacing:.08em;

}

.value{

    font-size:1rem;

}

/* popup */

.preview{

    position:absolute;

    left:50%;

    top:15px;

    transform:translateX(-50%);

    display:none;

    background:white;

    border-radius:12px;

    box-shadow:0 18px 40px rgba(0,0,0,.35);

    padding:12px;

    z-index:100;
    
    pointer-events: none; /* evite que la preview pique l'event mouseenter meme caché */
    
        overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;

}


.preview-grid{
    display:grid;
    grid-template-columns:repeat(2,320px);
    gap:10px;
}

.preview img{
    width:300px;
    height:220px;
    object-fit:cover;
    border-radius:8px;
}

.closePreview {

    display:none;

    position:absolute;

    top:8px;
    right:12px;

    width:32px;
    height:32px;

    background:rgba(0,0,0,.6);

    color:white;

    border-radius:50%;

    font-size:24px;

    line-height:30px;

    text-align:center;

    cursor:pointer;

    z-index:10;

}


/* Mobile */

@media(max-width:700px){

    #gallery{
        grid-template-columns:1fr;
        padding:15px;
    }

    .preview {
        width:90vw;
        max-width:90vw;
        left:5vw !important;
        top:5vh !important;
        transform:none !important;
        padding:10px;
        overflow-y:auto;
        
        max-height:90vh;
        touch-action: pan-y;
        overscroll-behavior: contain;
    }

    .preview-grid {
        display:flex;
        flex-direction:column;
        width:100%;
    }

    .preview img {
        width:100%;
        height:auto;
        max-width:100%;
        object-fit:cover;
    }
    
    .closePreview {
        display:block;
    }
    
} /* mobile */
</style>
</head>

<body>


<header>
    <h1><script>document.write(getCurrentFolderCapitalized())</script> Projects</h1>
</header>

<div id="gallery"></div>

<script>

alert(window.innerWidth)

const projects=[

{
title:"Salle des aromes (2017)",
location:"CDL",
partner:"",
technic:"Conception & Arduino Development",
cover:"aromes/00.jpg",
gallery:[
"aromes/01_zoom_girl.jpg",
"aromes/02.jpg",
]
},


{
title:"Snakable (2024)",
location:"Teatros Del Canal/Madrid",
partner:"ENSAD",
technic:"Arduino programming",
cover:"snake2/00_s-bianchini_ensadlab_snakable_09-2020_9j1a3215.tif.jpg",
gallery:[
"snake2/visitor.jpg",
"snake2/01.jpg",
"snake2/02.jpg",
"snake2/03.jpg",
"snake2/04.jpg",
"snake2/05_output.gif",
]
},

{
title:"TCA (2025)",
location:"(confidential)",
partner:"ENSAD",
technic:"Conception, mechanic design, building, electronics, experimentation, arduino development, tuning",
cover:"tca/00_20250520_135446_collage.jpg",
gallery:[
"tca/01_zoom.png",
"tca/02_20250520_174303.jpg",
"tca/03_gears.png",
"tca/04_ratchet.png",
]
},



{
title:"SmileBox (2026)",
location:"Le Mus&eacute; en Herbe/Paris",
partner:"Djeff",
technic:"Conception, building, Raspberry setup & programming",
cover:"smilebox/01_IMG_8353_ret_sm.jpg",
gallery:[
"smilebox/20260404_142333_vue_ecran.jpg",
"smilebox/20260404_144234_pm_crop.jpg",
"smilebox/IMG_8412_ret_sm.jpg",
"smilebox/IMG_8434_ret_sm.jpg",
"smilebox/IMG_8439_ret_sm.jpg",
]
}

];


function createProjectCard(project){

    // add projects path to all images
    project.cover = "./projects/" + project.cover
    
    for( let i in project.gallery )
    {
        project.gallery[i] = "./projects/" + project.gallery[i]
    }
    // insert cover in gallery
    project.gallery.unshift(project.cover)


    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=project.cover;
    img.className="main-image";

    const preview=document.createElement("div");
    preview.className="preview";
    
    const close=document.createElement("div");
    close.className="closePreview";
    close.innerHTML="x";

    preview.appendChild(close);

    const grid=document.createElement("div");
    grid.className="preview-grid";


    project.gallery.forEach(src=>{

        const i=document.createElement("img");
        i.src=src;
        grid.appendChild(i);

    });

    preview.appendChild(grid);

//~     card.appendChild(preview);
    document.body.appendChild(preview);

    card.appendChild(img);

    const info=document.createElement("div");
    info.className="info";
    
    let partner = project.partner
    
    if( partner == "ENSAD" )
    {
        partner = "Ecole Nationale des Arts D&eacute;coratifs (ENSAD)"
    }
    
    let location = project.location
    
    if( location == "CDL" )
    {
        location = "Les Caves du Louvre/Paris"
    }

    info.innerHTML=`
        <div><span class="label">Project</span><br><span class="value">${project.title}</span></div>
        <div><span class="label">Location</span><br><span class="value">${location}</span></div>
        <div><span class="label">Partner</span><br><span class="value">${partner}</span></div>
        <div><span class="label">Technics</span><br><span class="value">${project.technic}</span></div>
    `;

    card.appendChild(info);

    card.addEventListener("mouseenter",()=>
    {
        const r = card.getBoundingClientRect();

        console.log( "DBG: preview: rect:", r )
        console.log( "DBG: preview: window.innerWidth:", window.innerWidth )

        preview.style.display = "block";

        if (window.innerWidth > 700) 
        {
            console.log( "DBG: desktop: side" )
            const popupWidth = 640;

            if (r.right +  30 <= window.innerWidth *0.6)
            {
                // a droite
                preview.style.left = (r.right + 20) + "px";
            } 
            else 
            {
                // a gauche
                preview.style.left = (r.left - popupWidth - 20) + "px";
            }

            console.log( "DBG: preview: left:", preview.style.left )

            preview.style.top = r.top + "px";
            preview.style.transform = "none";
            
        } 
        else 
        {
            console.log( "DBG: Mobile : centree" )
            preview.style.left = "50%";
            preview.style.top = "50%";
            preview.style.transform = "translate(-50%,-50%)";
            document.body.style.overflow = "hidden"; // ne scroll pas sous la preview
        }
        
    } ); // mouseenter

    card.addEventListener("mouseleave",()=>{
    
        preview.style.display="none";
        document.body.style.overflow = "";
        
    }); // mouseleave

    // Mobile tap
    img.addEventListener("click",(e)=>{

        if(window.innerWidth<700){

            e.stopPropagation();

            preview.style.display=
                preview.style.display==="block"
                ?"none"
                :"block";

        }

    });

    return card;

}


const gallery=document.getElementById("gallery");

projects.forEach(p=>{
    gallery.appendChild(createProjectCard(p));
});


document.addEventListener("click",()=>{

    document.querySelectorAll(".preview").forEach(p=>{
        p.style.display="none";
    });

});

close.addEventListener("click", (e)=>{
    e.stopPropagation();
    preview.style.display="none";
    document.body.style.overflow="";
});

</script>

</body>
</html>
