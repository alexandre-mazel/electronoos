<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Mosaic</title>

<style>
:root{
    --card-width:320px;
    --image-height:240px;
    --radius:14px;
    --shadow:0 10px 28px rgba(0,0,0,.12);
    --text:#222;
    --muted:#666;
    --bg:#f5f6f8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    font-family:Inter,Segoe UI,Roboto,sans-serif;
    color:var(--text);
}

header{
    text-align:center;
    padding:50px 20px 30px;
}

header h1{
    margin:0;
    font-weight:300;
    letter-spacing:2px;
    font-size:2.2rem;
}

#gallery{

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(320px,1fr));

    gap:28px;

    padding:30px;

    max-width:1700px;

    margin:auto;

}

.card{

    background:white;

    border-radius:var(--radius);

    overflow:hidden;

    box-shadow:var(--shadow);

    transition:.25s;

    position:relative;

}

.card:hover{
    transform:translateY(-4px);
}

.main-image{

    width:100%;
    height:240px;

    object-fit:cover;

    display:block;

    cursor:pointer;

}

.info{

    padding:18px;

}

.info div{

    margin:5px 0;

    line-height:1.3em;

}

.label{

    color:var(--muted);

    font-size:.82rem;

    text-transform:uppercase;

    letter-spacing:.08em;

}

.value{

    font-size:1rem;

}

/* popup */

.preview{

    position:absolute;

    left:50%;

    top:15px;

    transform:translateX(-50%);

    display:none;

    background:white;

    border-radius:12px;

    box-shadow:0 18px 40px rgba(0,0,0,.35);

    padding:12px;

    z-index:100;

}

.preview-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:8px;

}

.preview img{

    width:220px;

    height:165px;

    object-fit:cover;

    border-radius:8px;

}

/* Mobile */

@media(max-width:700px){

    #gallery{

        grid-template-columns:1fr;

        padding:15px;

    }

    .preview{

        position:fixed;

        left:50%;

        top:50%;

        transform:translate(-50%,-50%);

        max-width:95vw;

    }

    .preview img{

        width:42vw;
        height:31vw;

    }

}
</style>
</head>

<body>

<header>
    <h1>Projects</h1>
</header>

<div id="gallery"></div>

<script>

const projects=[

{
title:"MibKit",
location:"Madrid",
partner:"ENSAD",
technic:"Arduino & Electronics",
cover:"images/mibkit/main.jpg",
gallery:[
"images/mibkit/1.jpg",
"images/mibkit/2.jpg",
"images/mibkit/3.jpg",
"images/mibkit/4.jpg"
]
},

{
title:"Interactive Wall",
location:"Paris",
partner:"IRCAM",
technic:"Computer Vision",
cover:"images/wall/main.jpg",
gallery:[
"images/wall/1.jpg",
"images/wall/2.jpg",
"images/wall/3.jpg",
"images/wall/4.jpg"
]
},

{
title:"Light Forest",
location:"Tokyo",
partner:"Sony CSL",
technic:"LED Installation",
cover:"images/forest/main.jpg",
gallery:[
"images/forest/1.jpg",
"images/forest/2.jpg",
"images/forest/3.jpg",
"images/forest/4.jpg"
]
}

];


function createProjectCard(project){

    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=project.cover;
    img.className="main-image";

    const preview=document.createElement("div");
    preview.className="preview";

    const grid=document.createElement("div");
    grid.className="preview-grid";

    project.gallery.forEach(src=>{

        const i=document.createElement("img");
        i.src=src;
        grid.appendChild(i);

    });

    preview.appendChild(grid);

    card.appendChild(preview);

    card.appendChild(img);

    const info=document.createElement("div");
    info.className="info";

    info.innerHTML=`
        <div><span class="label">Project</span><br><span class="value">${project.title}</span></div>
        <div><span class="label">Location</span><br><span class="value">${project.location}</span></div>
        <div><span class="label">Partner</span><br><span class="value">${project.partner}</span></div>
        <div><span class="label">Technics</span><br><span class="value">${project.technic}</span></div>
    `;

    card.appendChild(info);

    card.addEventListener("mouseenter",()=>{
        preview.style.display="block";
    });

    card.addEventListener("mouseleave",()=>{
        preview.style.display="none";
    });

    // Mobile tap
    img.addEventListener("click",(e)=>{

        if(window.innerWidth<700){

            e.stopPropagation();

            preview.style.display=
                preview.style.display==="block"
                ?"none"
                :"block";

        }

    });

    return card;

}


const gallery=document.getElementById("gallery");

projects.forEach(p=>{
    gallery.appendChild(createProjectCard(p));
});


document.addEventListener("click",()=>{

    document.querySelectorAll(".preview").forEach(p=>{
        p.style.display="none";
    });

});

</script>

</body>
</html>
