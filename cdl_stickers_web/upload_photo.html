<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Les Caves du Louvre</title>
<link rel="icon" type="image/png" href="/logo_cdl_ico.png">

<style>
html,body{
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#faf7f2;
    color:#222;
}

#page_container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;
}

#card_container{
    width:100%;
    max-width:600px;
    background:white;
    border-radius:20px;
    box-shadow:0 12px 40px rgba(0,0,0,.12);
    padding:30px;
    box-sizing:border-box;
    text-align:center;
}

#logo_placeholder{
    width:180px;
    height:80px;
    margin:auto;
    border:2px dashed #b99a63;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    color:#b99a63;
}

#title_text{
    font-size:36px;
    margin-top:25px;
    font-weight:bold;
}

#description_text{
    margin-top:15px;
    font-size:22px;
    line-height:1.4em;
}

#file_input{
    display:none;
}

#pick_button{
    margin-top:30px;
    width:100%;
    padding:22px;
    font-size:24px;
    border:none;
    border-radius:12px;
    background:#8b5d33;
    color:white;
    cursor:pointer;
}

#pick_button:hover{
    background:#714a29;
}

#preview_image{
    display:none;
    margin-top:25px;
    width:100%;
    border-radius:14px;
}

#progress_container{
    display:none;
    margin-top:25px;
    width:100%;
    height:28px;
    border-radius:14px;
    overflow:hidden;
    background:#ddd;
}

#progress_bar{
    width:0%;
    height:100%;
    background:#8b5d33;
    transition:width .2s;
}

#status_text{
    margin-top:20px;
    font-size:22px;
    min-height:30px;
}

#upload_button{
    display:none;
    margin-top:25px;
    width:100%;
    padding:22px;
    font-size:24px;
    border:none;
    border-radius:12px;
    background:#2d7f48;
    color:white;
    cursor:pointer;
}

#upload_button:hover{
    background:#24683a;
}

@media(max-width:700px){

#card_container{
    padding:20px;
}

#title_text{
    font-size:30px;
}

#description_text{
    font-size:20px;
}

#pick_button,
#upload_button{
    font-size:22px;
}

}
</style>

</head>

<body>

<div id="page_container">

<div id="card_container">
<!--
<div id="logo_placeholder">
LOGO
</div>
-->
<img src = "logo_cdl_small.png" width=200px />
<br>

<div id="title_text"></div>

<div id="description_text"></div>

<input
id="file_input"
type="file"
accept="image/*"
> <!-- param: capture="environment" => open rear camera; "user": selfie cam; rien: gallery -->

<button id="pick_button"></button>

<img id="preview_image">

<button id="upload_button"></button>

<div id="progress_container">
<div id="progress_bar"></div>
</div>

<div id="status_text"></div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const language_code =
navigator.language.toLowerCase().startsWith("fr")
? "fr"
: "en";

const text_dictionary = {

fr:{
title:"Les Caves du Louvre",
description:"Choisissez une photo puis envoyez-la.",
pick:"Choisir une photo",
upload:"Envoyer la photo",
uploading:"Envoi...",
received:"Merci ! Votre photo a bien été reçue.",
error:"Une erreur est survenue."
},

en:{
title:"Les Caves du Louvre",
description:"Choose a picture and upload it.",
pick:"Choose a picture",
upload:"Upload picture",
uploading:"Uploading...",
received:"Thank you! Your picture has been successfully received.",
error:"An error occurred."
}

};

const text_current = text_dictionary[language_code];

//~ document.getElementById("title_text").textContent =
//~ text_current.title;

document.getElementById("description_text").textContent =
text_current.description;

document.getElementById("pick_button").textContent =
text_current.pick;

document.getElementById("upload_button").textContent =
text_current.upload;

let image_selected = null;

document
.getElementById("pick_button")
.addEventListener("click",function(){

document.getElementById("file_input").click();

});

document
.getElementById("file_input")
.addEventListener("change",function(e){

if(!e.target.files.length)
return;

image_selected = e.target.files[0];

const image_url =
URL.createObjectURL(image_selected);

const image_preview =
document.getElementById("preview_image");

image_preview.src = image_url;
image_preview.style.display="block";

document.getElementById("upload_button").style.display="block";

document.getElementById("status_text").textContent="";

console.log("scroll to bottom")
setTimeout(() => {
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}, 500);

});

document
.getElementById("upload_button")
.addEventListener("click",upload_image);

function upload_image(){

if(image_selected==null)
return;

document.getElementById("progress_container").style.display="block";
document.getElementById("status_text").textContent=text_current.uploading;

const form_data = new FormData();

form_data.append("image",image_selected);

const request = new XMLHttpRequest();

request.open("POST","/upload?id="+ encodeURIComponent(id),true);

request.upload.onprogress = function(event){

if(event.lengthComputable){

const percent =
Math.round(event.loaded*100/event.total);

document.getElementById("progress_bar").style.width =
percent+"%";

}

};

request.onload = function(){

if(request.status>=200 && request.status<300){

document.getElementById("status_text").textContent =
text_current.received;

console.log("scroll to bottom(2)")
setTimeout(() => {
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}, 500);

}
else{

document.getElementById("status_text").textContent =
text_current.error;

}

};

request.onerror=function(){

document.getElementById("status_text").textContent =
text_current.error;

};

request.send(form_data);

}

</script>

</body>
</html>
